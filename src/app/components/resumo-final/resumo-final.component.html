<div class="sample-container">
  <po-loading-overlay *ngIf="loadTela===true" [p-screen-lock]="true"></po-loading-overlay>
</div>

<div class="cabec">
  <div class="campofiltros">

    <po-combo class="combo-estab" [ngModel]="codEstabelecimento" (ngModelChange)="codEstabelecimento = $event"
       p-clean="true" [p-options]="listaEstabelecimentos" p-label="Estabelecimento"
      p-icon="bi bi-pin-map" [p-placeholder]="placeHolderEstabelecimento">
      <ng-template p-combo-option-template let-option>
        <div class="po-row">
          <po-icon class="po-sm-2 po-md-3 po-lg-1" p-size="sm" p-icon="bi bi-pin-map"></po-icon>
          <div class="po-sm-10 po-md-9 po-lg-11">
            <div class="po-font-text-large-bold">{{ option.label }}</div>
            <div class="po-font-text-smaller">Filial: {{ option.codFilial }}</div>
          </div>
        </div>
      </ng-template>
    </po-combo>
    <po-lookup class="po-md-12" name="codEmitente" [(ngModel)]="codEmitente"
      [p-filter-params]="codigoEmitente ? { codigoEmit: codigoEmitente } : {}" p-label="Emitente"
      [p-virtual-scroll]="true" p-placeholder="Selecione um Emitente"
      changeVisibleColumns="['codEmitente', 'nomeAbrev']" [p-field-format]="['codEmitente', 'nomeAbrev']"
      [p-columns]="columns" [p-filter-service]="EmitenteService" [p-literals]="{ 'modalTitle': 'Zoom de Emitente' }"
      p-field-value="codEmitente" p-clean="true" >
    </po-lookup>
    <po-input class="po-md-6" name="nrNotaFis" [(ngModel)]="nrNotaFis" p-placeholder="NF" p-label="NF" p-required
      [p-maxlength]="7"></po-input>
    <po-input class="po-md-6" name="serie" [(ngModel)]="serie" p-placeholder="Serie" p-label="Serie" p-required
      [p-maxlength]="3"></po-input>
    <po-input class="po-md-6" name="qtd" [(ngModel)]="qtd" p-placeholder="Qtd" p-label="Qtd" p-required
      [p-maxlength]="7" p-disabled="true"></po-input>


    <po-button p-tooltip="Buscar Dados" p-icon="bi bi-check2-circle" p-label="Buscar Dados"
      p-kind="primary"></po-button>
    <po-button p-tooltip="Limpar Filtros" p-icon="bi bi-eraser-fill" p-label="Limpar filtros" p-kind="primary">
    </po-button>
  </div>

</div>

<div class="cabec">
  <div class="campofiltrosc">


    <!-- TÍTULO -->
    <div class="titulo-box">
      Geração Arquivo Conferência de Retorno de Conclusão de Reparos<span></span>
    </div>


    <!-- BOTÕES -->
    <div class="botoes-acoes">
      <po-button p-label="Gerar Arquivo Conferência " p-kind="primary" p-icon="bi bi-gear" (p-click)="onImpressao()">
      </po-button>

      <po-button p-label="Finalizar Processo" p-icon="bi bi-check2-all" (p-click)="onFinalizar()">
      </po-button>
    </div>

    <!-- TABELA -->
    <po-table [p-items]="listaArquivos" [p-columns]="colunasArquivos" [p-hide-table-search]="true" p-container="true"
      [p-hide-columns-manager]="true">

      <ng-template p-table-column-template p-property="nomeArquivo" let-value>
        <btnDownload [nomeArquivo]="value"></btnDownload>
      </ng-template>

    </po-table>

  </div>

</div>

<div class="cabec">


  <div class="campofiltrosc">


    <!-- TÍTULO -->
    <div class="titulo-box">
      Etiqueta Impressas de Reparos Trocados<span></span>
    </div>


    <!-- BOTÕES -->
    <div class="botoes-acoes">
      <po-button p-label="Gerar Arquivo Etiqueta de Reparos" p-kind="primary" p-icon="bi bi-gear"
        (p-click)="onImpressao()">
      </po-button>

      <po-button p-label="Finalizar Processo" p-icon="bi bi-check2-all" (p-click)="onFinalizar()">
      </po-button>
    </div>

    <!-- TABELA -->
    <po-table [p-items]="listaArquivos" [p-columns]="colunasArquivos" [p-hide-table-search]="true" p-container="true"
      [p-hide-columns-manager]="true">

      <ng-template p-table-column-template p-property="nomeArquivo" let-value>
        <btnDownload [nomeArquivo]="value"></btnDownload>
      </ng-template>

    </po-table>

  </div>

</div>


<po-modal #timer [p-title]=labelPedExec p-size="sm" p-click-out="false" [p-hide-close]="true" [p-hide-close]="true"
  [p-primary-action]="acaoCancelarTimer">
  <p class="po-font-title"><i [ngClass]="labelTimer === 'Arquivo liberado !' ? 'bi bi-alarm-fill' : 'bi bi-alarm'"></i>
    {{labelTimer}}</p>
  <p class="po-font-text-large">{{labelTimerDetail}}</p>
</po-modal>

<rpw-acomp [numPedExec]="numPedExec()" [intervalo]="5000" [tentativas]="50">
</rpw-acomp>
